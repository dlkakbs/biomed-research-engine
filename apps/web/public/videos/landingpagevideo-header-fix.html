<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=960, initial-scale=1.0" />
    <style>
      html, body {
        margin: 0;
        width: 960px;
        height: 138px;
        overflow: hidden;
        background: rgba(4, 7, 13, 0.98);
      }

      .wrap {
        width: 960px;
        height: 138px;
        box-sizing: border-box;
        padding: 18px 28px;
        font-family: Arial, Helvetica, sans-serif;
        color: white;
      }

      .brand {
        color: #9bd7ff;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 4px;
        line-height: 1;
        margin-bottom: 12px;
      }

      .title {
        font-size: 48px;
        line-height: 1;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">VELIORA</div>
      <div class="title">BioMed Research Engine</div>
    </div>
  </body>
</html>
